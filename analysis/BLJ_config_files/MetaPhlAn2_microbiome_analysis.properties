Assign_WLgroups.scriptPath=../RScripts/Assign_WLgroups.R
Assign_WLgroups.param=BLJ Tertile
Assign_WLgroups.resources=${Rfunc}
Assign_WLgroups.imageOwner=asorgen
Assign_WLgroups.imageTag=v5
