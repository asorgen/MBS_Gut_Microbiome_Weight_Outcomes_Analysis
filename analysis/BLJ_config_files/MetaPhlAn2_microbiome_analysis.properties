##################################################################################################
# To run this script
# cd gut-microbiome-bariatric-weight-outcomes/analysis/BLJ_config_files
# biolockj -d MetaPhlAn2_microbiome_analysis.properties
# biolockj -d -c MetaPhlAn2_microbiome_analysis.properties -r ${BLJ_PROJ}/MetaPhlAn2_microbiome_analysis_*
##################################################################################################

# make sure memory is set to 16GB
# Docker > Preferences > Resources

genMod.launcher=Rscript
pipeline.inputTypes=other
pipeline.copyInput=Y

input.dirPaths=../input/
input.allowDuplicateNames=Y
Rfunc=../RScripts/functions.R
classifier=MetaPhlAn2

#####-- 00. PatientCharacteristics ----------------------------------------------------------------------------------------------------#####
##- Generate a summary table of patient demographics -------------------------------------------------------------------------------------##
#BioModule biolockj.module.diy.GenMod AS PatientCharacteristics
PatientCharacteristics.scriptPath = ../RScripts/PatientCharacteristics.R
# PatientCharacteristics.param=weight_update.txt
PatientCharacteristics.param=BLJ weight_update_BLonly_excluded.txt
PatientCharacteristics.resources=${Rfunc}
PatientCharacteristics.imageOwner=asorgen
PatientCharacteristics.imageTag=v5
PatientCharacteristics.imageName=gg-tidyr

#####-- 01. BMI_Results ---------------------------------------------------------------------------------------------------------------#####
##- Calculates change in BMI from baseline and models BMI & weight over time -------------------------------------------------------------##
#BioModule biolockj.module.diy.GenMod AS BMI_Results
BMI_Results.scriptPath = ../RScripts/BMI_Results.R
BMI_Results.param=BLJ weight_update_BLonly_excluded.txt
BMI_Results.resources=${Rfunc}
BMI_Results.imageOwner=asorgen
BMI_Results.imageTag=v5
BMI_Results.imageName=gg-tidyr

#####-- 02. ExcessWeightLoss ----------------------------------------------------------------------------------------------------------#####
##- Calculates weight change metrics, classifies responders/non-responders, generates tables for average weight loss ---------------------##
#BioModule biolockj.module.diy.GenMod AS ExcessWeightLoss
ExcessWeightLoss.scriptPath = ../RScripts/ExcessWeightLoss.R
ExcessWeightLoss.param=BLJ
ExcessWeightLoss.resources=${Rfunc}
ExcessWeightLoss.imageOwner=asorgen
ExcessWeightLoss.imageTag=v5
ExcessWeightLoss.imageName=gg-tidyr

#####-- 03. WeightMetaMerge ----------------------------------------------------------------------------------------------------------#####
##- Merges weight data with patient demographics ----------------------------------------------------------------------------------------##
#BioModule biolockj.module.diy.GenMod AS WeightMetaMerge
WeightMetaMerge.scriptPath=../RScripts/WeightMetaMerge.R
WeightMetaMerge.imageOwner=asorgen
WeightMetaMerge.imageTag=v4
WeightMetaMerge.imageName=gg-tidyr
WeightMetaMerge.param=BLJ
WeightMetaMerge.resources=${Rfunc}

#####-- 04. Assign_WLgroups ----------------------------------------------------------------------------------------------------------#####
##- Assign weight loss group at each timepoint ------------------------------------------------------------------------------------------##
